AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  cooking_web_app - Backend with DynamoDB for meal management

Parameters:
  TableName:
    Type: String
    Default: CookingAppData
  AppRegion:
    Type: String
    Default: eu-south-1

Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Environment:
      Variables:
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
      AllowOrigin: "'*'"

Resources:
  # --- 1. COGNITO USER POOL ---
  CookingUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: CookingAppUsers
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8

  CookingUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: cooking-app-auth
      UserPoolId: !Ref CookingUserPool

  # --- NUOVO: PROVIDER GOOGLE PER COGNITO ---
  CookingUserPoolGoogleProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Properties:
      UserPoolId: !Ref CookingUserPool
      ProviderName: Google
      ProviderType: Google
      ProviderDetails:
        client_id: "{{resolve:ssm:/cooking-app/google/client-id}}"
        client_secret: "{{resolve:ssm:/cooking-app/google/client-secret}}"
        authorize_scopes: "profile email openid"
      AttributeMapping:
        email: email
        username: sub

  # --- 2. COGNITO USER POOL CLIENT (For React) ---
  CookingUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: CookingUserPoolGoogleProvider # Necessario per creare prima il provider
    Properties:
      ClientName: CookingReactApp
      UserPoolId: !Ref CookingUserPool
      SupportedIdentityProviders:
        - COGNITO
        - Google
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      GenerateSecret: false # Must be false for Single Page Apps like React
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - phone
        - email
        - profile
        - openid
      CallbackURLs:
        - http://localhost:3000/
        - !Sub "https://${FrontendCloudFront.DomainName}/"
      LogoutURLs:
        - http://localhost:3000/
        - !Sub "https://${FrontendCloudFront.DomainName}/"

  # --- 3. SECURE API GATEWAY ---
  CookingApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowMethods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${CookingUserPool}"

  # --- 4. DATABASE (Single Table Design) ---
  CookingAppTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: CookingAppData
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # --- 5. THE LAMBDA FUNCTIONS ---
  MealFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: src/handlers/mealHandler.lambdaHandler
      Runtime: nodejs24.x
      Architectures:
        - x86_64
      Environment:
        Variables:
          TABLE_NAME: !Ref TableName
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
      Events:
        GetMeals:
          Type: Api
          Properties:
            RestApiId: !Ref CookingApi
            Path: /meals
            Method: get
        CreateMeal:
          Type: Api
          Properties:
            RestApiId: !Ref CookingApi
            Path: /meals
            Method: post
        DeleteMeal:
          Type: Api
          Properties:
            RestApiId: !Ref CookingApi
            Path: /meals/{itemId}
            Method: delete
        UpdateMeal:
          Type: Api
          Properties:
            RestApiId: !Ref CookingApi
            Path: /meals/{itemId}
            Method: patch
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: false
        EntryPoints:
          - src/handlers/mealHandler.ts

  PreferencesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: src/handlers/preferencesHandler.lambdaHandler
      Runtime: nodejs24.x
      Architectures:
        - x86_64
      Environment:
        Variables:
          TABLE_NAME: !Ref TableName
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
      Events:
        PreferencesApi:
          Type: Api
          Properties:
            RestApiId: !Ref CookingApi
            Path: /preferences
            Method: any
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: false
        EntryPoints:
          - src/handlers/preferencesHandler.ts

  TaskFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: src/handlers/taskHandler.lambdaHandler
      Runtime: nodejs24.x
      Architectures:
        - x86_64
      Environment:
        Variables:
          TABLE_NAME: !Ref TableName
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
      Events:
        GetTask:
          Type: Api
          Properties:
            RestApiId: !Ref CookingApi
            Path: /tasks/{taskId}
            Method: get
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: false
        EntryPoints:
          - src/handlers/taskHandler.ts

  GroceryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: src/handlers/groceryHandler.lambdaHandler
      Runtime: nodejs24.x
      Architectures:
        - x86_64
      Environment:
        Variables:
          TABLE_NAME: !Ref TableName
          GROCERY_WORKER_FUNCTION_NAME: !Ref GroceryWorkerFunction
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
        - Statement:
            Effect: Allow
            Action:
              - lambda:InvokeFunction
            Resource: !GetAtt GroceryWorkerFunction.Arn
      Events:
        GetGroceries:
          Type: Api
          Properties:
            RestApiId: !Ref CookingApi
            Path: /groceries
            Method: get
        CreateGrocery:
          Type: Api
          Properties:
            RestApiId: !Ref CookingApi
            Path: /groceries
            Method: post
        ClearGroceries:
          Type: Api
          Properties:
            RestApiId: !Ref CookingApi
            Path: /groceries
            Method: delete
        DeleteGrocery:
          Type: Api
          Properties:
            RestApiId: !Ref CookingApi
            Path: /groceries/{itemId}
            Method: delete
        UpdateGrocery:
          Type: Api
          Properties:
            RestApiId: !Ref CookingApi
            Path: /groceries/{itemId}
            Method: patch
        GenerateGroceries:
          Type: Api
          Properties:
            RestApiId: !Ref CookingApi
            Path: /groceries/generate
            Method: post
        CheckGroceries:
          Type: Api
          Properties:
            RestApiId: !Ref CookingApi
            Path: /groceries/check
            Method: post
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: false
        EntryPoints:
          - src/handlers/groceryHandler.ts

  GroceryWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: src/handlers/groceryWorkerHandler.lambdaHandler
      Runtime: nodejs24.x
      Timeout: 90
      MemorySize: 256
      Architectures:
        - x86_64
      Environment:
        Variables:
          TABLE_NAME: !Ref TableName
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
        - Statement:
            Effect: Allow
            Action:
              - bedrock:InvokeModel
            Resource:
              - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/eu.anthropic.claude-haiku-4-5-20251001-v1:0"
              - "arn:aws:bedrock:*::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: false
        EntryPoints:
          - src/handlers/groceryWorkerHandler.ts

  IdeasFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: src/handlers/ideaHandler.lambdaHandler
      Runtime: nodejs24.x
      Architectures:
        - x86_64
      Environment:
        Variables:
          TABLE_NAME: !Ref TableName
          IDEAS_WORKER_FUNCTION_NAME: !Ref IdeasWorkerFunction
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
        - Statement:
            Effect: Allow
            Action:
              - lambda:InvokeFunction
            Resource: !GetAtt IdeasWorkerFunction.Arn
      Events:
        GetIdeas:
          Type: Api
          Properties:
            RestApiId: !Ref CookingApi
            Path: /ideas
            Method: get
        ClearIdeas:
          Type: Api
          Properties:
            RestApiId: !Ref CookingApi
            Path: /ideas
            Method: delete
        GenerateIdeas:
          Type: Api
          Properties:
            RestApiId: !Ref CookingApi
            Path: /ideas/generate
            Method: post
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: false
        EntryPoints:
          - src/handlers/ideaHandler.ts

  IdeasWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: src/handlers/ideaWorkerHandler.lambdaHandler
      Runtime: nodejs24.x
      Timeout: 90
      MemorySize: 256
      Architectures:
        - x86_64
      Environment:
        Variables:
          TABLE_NAME: !Ref TableName
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
        - Statement:
            Effect: Allow
            Action:
              - bedrock:InvokeModel
            Resource:
              - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/eu.anthropic.claude-haiku-4-5-20251001-v1:0"
              - "arn:aws:bedrock:*::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: false
        EntryPoints:
          - src/handlers/ideaWorkerHandler.ts

  IngredientsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: src/handlers/ingredientsHandler.lambdaHandler
      Runtime: nodejs24.x
      Architectures:
        - x86_64
      Environment:
        Variables:
          TABLE_NAME: !Ref TableName
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
      Events:
        GetIngredients:
          Type: Api
          Properties:
            RestApiId: !Ref CookingApi
            Path: /ingredients
            Method: get
        AddIngredient:
          Type: Api
          Properties:
            RestApiId: !Ref CookingApi
            Path: /ingredients
            Method: post
        ClearIngredients:
          Type: Api
          Properties:
            RestApiId: !Ref CookingApi
            Path: /ingredients
            Method: delete
        DeleteIngredient:
          Type: Api
          Properties:
            RestApiId: !Ref CookingApi
            Path: /ingredients/{itemId}
            Method: delete
        UpdateIngredient:
          Type: Api
          Properties:
            RestApiId: !Ref CookingApi
            Path: /ingredients/{itemId}
            Method: patch
        ImportIngredients:
          Type: Api
          Properties:
            RestApiId: !Ref CookingApi
            Path: /ingredients/import
            Method: post
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        EntryPoints:
          - src/handlers/ingredientsHandler.ts

  PlanFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: src/handlers/planHandler.lambdaHandler
      Runtime: nodejs24.x
      Architectures:
        - x86_64
      Environment:
        Variables:
          TABLE_NAME: !Ref TableName
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
      Events:
        GetPlans:
          Type: Api
          Properties:
            RestApiId: !Ref CookingApi
            Path: /plans
            Method: get
        SetCurrentPlan:
          Type: Api
          Properties:
            RestApiId: !Ref CookingApi
            Path: /plans/current
            Method: patch
        DeletePlan:
          Type: Api
          Properties:
            RestApiId: !Ref CookingApi
            Path: /plans/{planNR}
            Method: delete
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: false
        EntryPoints:
          - src/handlers/planHandler.ts

  # --- 6. FRONTEND HOSTING ---
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-frontend-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  CloudFrontOriginAccessIdentity:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub "OAI for ${AWS::StackName} frontend"

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Principal:
              CanonicalUser: !GetAtt CloudFrontOriginAccessIdentity.S3CanonicalUserId

  FrontendCloudFront:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - DomainName: !GetAtt FrontendBucket.RegionalDomainName
            Id: S3Origin
            S3OriginConfig:
              OriginAccessIdentity: !Sub "origin-access-identity/cloudfront/${CloudFrontOriginAccessIdentity}"
        Enabled: true
        DefaultRootObject: index.html
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          ForwardedValues:
            QueryString: false
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html

  # --- 7. MONITORING ---
  ApplicationResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties:
      Name:
        Fn::Sub: ApplicationInsights-SAM-${AWS::StackName}
      ResourceQuery:
        Type: CLOUDFORMATION_STACK_1_0
  ApplicationInsightsMonitoring:
    Type: AWS::ApplicationInsights::Application
    Properties:
      ResourceGroupName:
        Ref: ApplicationResourceGroup
      AutoConfigurationEnabled: "true"

Outputs:
  CookingApiUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${CookingApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/meals"

  UserPoolId:
    Description: "Cognito User Pool ID"
    Value: !Ref CookingUserPool

  UserPoolClientId:
    Description: "Cognito User Pool Client ID"
    Value: !Ref CookingUserPoolClient

  FrontendUrl:
    Description: "CloudFront URL for the frontend"
    Value: !Sub "https://${FrontendCloudFront.DomainName}"

  FrontendBucketName:
    Description: "S3 Bucket name for frontend"
    Value: !Ref FrontendBucket

  FrontendCloudFrontId:
    Description: "CloudFront Distribution ID"
    Value: !Ref FrontendCloudFront
